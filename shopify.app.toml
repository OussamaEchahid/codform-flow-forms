
# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "7e4608874bbcc38afa1953948da28407"
name = "CODFORM - COD Forms"
handle = "codform-flow-forms"
application_url = "https://codform-flow-forms.lovable.app"
embedded = false

[build]
include_config_on_deploy = true

[webhooks]
api_version = "2025-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# أضفنا جميع الصلاحيات المطلوبة للعمل مع قوالب ونماذج المتجر
scopes = "write_products,read_products,read_orders,write_orders,write_script_tags,read_themes,write_themes,read_content,write_content"

[auth]
redirect_urls = [
  "https://codform-flow-forms.lovable.app/shopify-callback",
  "https://codform-flow-forms.lovable.app/api/shopify-callback",
  "https://codform-flow-forms.lovable.app/auth/callback",
  "https://codform-flow-forms.lovable.app/auth/offline",
  "https://codform-flow-forms.lovable.app/auth/token",
  "https://codform-flow-forms.lovable.app/auth",
  "https://codform-flow-forms.lovable.app/shopify",
  "https://codform-flow-forms.lovable.app/shopify-redirect",
  "https://codform-flow-forms.lovable.app/dashboard",
  "https://codform-flow-forms.lovable.app",
  "https://admin.shopify.com/store/*/apps/*/auth/callback",
  "https://admin.shopify.com/store/*/auth/callback"
]

[pos]
embedded = false

[extensions]
theme_app_extensions = ["extensions/theme-extension-codform"]
ui_extensions = ["extensions/admin-action-extension"]
