
name = "CODFORM - نماذج الدفع عند الاستلام"
type = "theme"
handle = "theme-extension-codform"

[[metafields]]
namespace = "codform"
key = "settings"

[[blocks]]
name = "نموذج الدفع عند الاستلام"
handle = "codform_form"
type = "product"
target = "section"

[settings]
# Global extension settings

[[settings.fields]]
key = "insertion_method"
type = "select"
default = "manual"

[settings.fields.label]
en = "Form Insertion Method"
ar = "طريقة إدراج النموذج"

[[settings.fields.options]]
value = "auto"
[settings.fields.options.label]
en = "Automatic"
ar = "تلقائي"

[[settings.fields.options]]
value = "manual"
[settings.fields.options.label]
en = "Manual"
ar = "يدوي"

[[settings.fields]]
key = "enable_icons"
type = "checkbox"
default = true

[settings.fields.label]
en = "Enable Field Icons"
ar = "تفعيل أيقونات الحقول"

[settings.fields.info]
en = "Show icons in form fields when available"
ar = "عرض الأيقونات في حقول النموذج عند توفرها"
