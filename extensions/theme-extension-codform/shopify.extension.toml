
name = "CODFORM - نماذج الدفع عند الاستلام"
type = "theme"
handle = "theme-extension-codform"

[[metafields]]
namespace = "codform"
key = "settings"

[settings]
fields = [
  { key = "insertion_method", type = "select", label = { en = "Form Insertion Method", ar = "طريقة إدراج النموذج" }, options = [
    { value = "auto", label = { en = "Automatic (recommended)", ar = "تلقائي (موصى به)" } },
    { value = "manual", label = { en = "Manual insertion", ar = "إدراج يدوي" } }
  ], default = "auto" }
]

[[extensions.blocks]]
name = "نموذج الدفع عند الاستلام"
handle = "codform_form"
type = "product"
target = "section"

[extensions.settings]
# Global extension settings
