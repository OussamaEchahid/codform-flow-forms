<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معالجة اتصال Shopify</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: #22c55e;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .error {
            color: #ef4444;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 1rem;
        }
        p {
            color: #6b7280;
            line-height: 1.6;
        }
        .redirect-info {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="spinner" class="spinner"></div>
        <h1 id="title">معالجة اتصال Shopify</h1>
        <p id="message">جاري معالجة طلب الاتصال، يرجى الانتظار...</p>
        <div id="redirectInfo" class="redirect-info" style="display: none;">
            سيتم إعادة توجيهك إلى لوحة التحكم خلال <span id="countdown">5</span> ثواني
        </div>
    </div>

    <script>
        console.log('🚀 Shopify Callback Handler Started');
        
        // الحصول على معلمات URL
        const urlParams = new URLSearchParams(window.location.search);
        const shop = urlParams.get('shop');
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');
        
        console.log('Callback parameters:', { shop, code, state, error });
        
        const spinner = document.getElementById('spinner');
        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const redirectInfo = document.getElementById('redirectInfo');
        const countdown = document.getElementById('countdown');
        
        // دالة لإظهار النجاح
        function showSuccess(msg) {
            spinner.style.display = 'none';
            title.innerHTML = '✅ تم الاتصال بنجاح!';
            message.textContent = msg;
            message.style.color = '#22c55e';
            
            // إظهار معلومات إعادة التوجيه
            redirectInfo.style.display = 'block';
            
            // عد تنازلي
            let timeLeft = 5;
            const timer = setInterval(() => {
                timeLeft--;
                countdown.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    window.location.href = 'https://codmagnet.com/dashboard';
                }
            }, 1000);
        }
        
        // دالة لإظهار الخطأ
        function showError(msg) {
            spinner.style.display = 'none';
            title.innerHTML = '❌ فشل في الاتصال';
            message.textContent = msg;
            message.style.color = '#ef4444';
            
            setTimeout(() => {
                window.location.href = 'https://codmagnet.com/shopify-connect';
            }, 5000);
        }
        
        // معالجة الـ callback
        async function processCallback() {
            try {
                // التحقق من وجود خطأ
                if (error) {
                    throw new Error(`خطأ من Shopify: ${error}`);
                }
                
                // التحقق من وجود المعلمات المطلوبة
                if (!shop || !code) {
                    throw new Error('معلمات غير مكتملة من Shopify');
                }
                
                console.log('🔄 Processing callback for shop:', shop);
                message.textContent = 'جاري تبادل رمز المصادقة مع Shopify...';
                
                // استدعاء edge function لمعالجة callback
                const response = await fetch('https://trlklwixfeaexhydzaue.supabase.co/functions/v1/shopify-auth-callback', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRybGtsd2l4ZmVhZXhoeWR6YXVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI3MTE0MTgsImV4cCI6MjA2ODI4NzQxOH0.6p52MXnM2UE0UfiD5ZDDkHWWuR0xcSmqJ85P4xuBd4M'
                    },
                    body: JSON.stringify({ shop, code, state })
                });
                
                if (!response.ok) {
                    const errorData = await response.text();
                    throw new Error(`خطأ من الخادم: ${response.status} - ${errorData}`);
                }
                
                const result = await response.json();
                console.log('✅ Callback processed successfully:', result);
                
                // حفظ معلومات المتجر في localStorage
                localStorage.setItem('shopify_store', shop);
                localStorage.setItem('shopify_connected', 'true');
                localStorage.setItem('shopify_last_connected', Date.now().toString());
                
                showSuccess(`تم ربط متجر ${shop} بنجاح!`);
                
            } catch (error) {
                console.error('❌ Callback processing failed:', error);
                showError(error.message || 'حدث خطأ غير متوقع أثناء معالجة الاتصال');
            }
        }
        
        // تشغيل معالجة callback
        processCallback();
    </script>
</body>
</html>
