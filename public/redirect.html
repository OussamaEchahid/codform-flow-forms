
<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جاري التوجيه - CODFORM</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      direction: rtl;
    }
    .container {
      text-align: center;
      padding: 2rem;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 90%;
      width: 500px;
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #7c3aed;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 2s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .debug {
      margin-top: 2rem;
      padding: 1rem;
      background-color: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 4px;
      text-align: left;
      font-size: 12px;
      max-height: 150px;
      overflow-y: auto;
      direction: ltr;
      display: none;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 1rem;
      color: #7c3aed;
    }
    .button {
      display: inline-block;
      background-color: #7c3aed;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      margin-top: 16px;
    }
    .button:hover {
      background-color: #6d28d9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">CODFORM</div>
    <h1>جاري التوجيه إلى لوحة التحكم</h1>
    <div class="loader"></div>
    <p>سيتم توجيهك تلقائيًا إلى لوحة التحكم خلال لحظات...</p>
    <p id="shopInfo"></p>
    <div id="manualRedirect" style="display: none; margin-top: 20px;">
      <p>إذا لم تتم إعادة توجيهك تلقائياً، يرجى النقر على الزر أدناه</p>
      <a href="/dashboard" class="button">الانتقال إلى لوحة التحكم</a>
    </div>
    <div class="debug" id="debug"></div>
  </div>

  <script>
    // عرض زر التوجيه اليدوي بعد فترة
    setTimeout(function() {
      document.getElementById('manualRedirect').style.display = 'block';
    }, 5000);

    // تمكين وضع التصحيح من خلال معلمة URL
    const urlParams = new URLSearchParams(window.location.search);
    const debug = urlParams.get('debug') === 'true';
    if (debug) {
      document.getElementById('debug').style.display = 'block';
    }
    
    // دالة لتسجيل معلومات التشخيص
    function logDebug(message) {
      const debugElem = document.getElementById('debug');
      if (debugElem) {
        const now = new Date();
        const timestamp = now.toLocaleTimeString();
        debugElem.innerHTML += `<div>[${timestamp}] ${message}</div>`;
        if (debug) {
          debugElem.style.display = "block";
        }
      }
    }
    
    // التحقق من معلمات URL وحفظها في localStorage
    const params = new URLSearchParams(window.location.search);
    const shop = params.get("shop");
    const hmac = params.get("hmac");
    const code = params.get("code");
    const state = params.get("state");
    
    // إظهار معلومات المتجر
    const shopInfo = document.getElementById('shopInfo');
    
    logDebug(`معلمات URL: ${window.location.search}`);
    
    if (shop) {
      shopInfo.textContent = "المتجر: " + shop;
      logDebug(`تم اكتشاف متجر: ${shop}`);
      
      // حفظ معلومات المتجر في localStorage
      try {
        localStorage.setItem('shopify_temp_store', shop);
        logDebug('تم حفظ معلومات المتجر المؤقتة في localStorage');
      } catch (e) {
        logDebug(`خطأ في حفظ البيانات: ${e.message}`);
      }
      
      // تحديد المسار المستهدف بناءً على المعلمات المتوفرة
      let targetPath;
      
      if (code || hmac) {
        // إذا كان لدينا رمز التفويض أو hmac، فهذا يعني أننا في مرحلة المصادقة
        targetPath = `/auth?${params.toString()}`;
        logDebug(`تم اكتشاف معلمات مصادقة، التوجيه إلى: ${targetPath}`);
      } else {
        // إذا كان لدينا فقط متجر، توجيه إلى مسار المصادقة
        targetPath = `/shopify?shop=${encodeURIComponent(shop)}`;
        logDebug(`توجيه إلى مسار Shopify: ${targetPath}`);
      }
      
      // تأخير قصير للسماح بعرض المعلومات
      setTimeout(() => {
        logDebug(`جاري التوجيه الآن إلى: ${targetPath}`);
        window.location.href = targetPath;
      }, 1500);
    } else {
      // إذا لم تكن هناك معلمة shop، قم بالتوجيه إلى لوحة التحكم
      shopInfo.textContent = "لم يتم توفير معلمة متجر - التوجيه إلى لوحة التحكم";
      logDebug('لم يتم العثور على معلمة shop، توجيه إلى لوحة التحكم');
      setTimeout(() => {
        window.location.href = "/dashboard";
      }, 1500);
    }
    
    // عرض نافذة التشخيص إذا كانت ممكنة
    if (debug) {
      document.getElementById('debug').style.display = "block";
    }
  </script>
</body>
</html>
