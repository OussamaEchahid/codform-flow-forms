
<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جاري التوجيه - CODFORM</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      direction: rtl;
    }
    .container {
      text-align: center;
      padding: 2rem;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #7c3aed;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 2s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .debug {
      margin-top: 2rem;
      padding: 1rem;
      background-color: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 4px;
      text-align: left;
      font-size: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>جاري التوجيه إلى لوحة التحكم</h1>
    <div class="loader"></div>
    <p>سيتم توجيهك تلقائيًا إلى لوحة التحكم خلال لحظات...</p>
    <p id="shopInfo"></p>
    <div class="debug" id="debug"></div>
  </div>

  <script>
    // التحقق مما إذا كانت هذه الصفحة تُحمل من Shopify
    const params = new URLSearchParams(window.location.search);
    const shop = params.get("shop");
    
    // إظهار معلومات التشخيص
    const shopInfo = document.getElementById('shopInfo');
    const debugInfo = document.getElementById('debug');
    
    if (shop) {
      shopInfo.textContent = "المتجر: " + shop;
      
      // التوجيه مع تعيين معلمة كاملة العنوان
      const redirectUrl = new URL("/auth", window.location.origin);
      redirectUrl.searchParams.append("shop", shop);
      
      // توجيه المستخدم إلى مسار المصادقة
      debugInfo.textContent = "توجيه إلى: " + redirectUrl.toString();
      debugInfo.style.display = "block";
      
      // تأخير قصير للسماح بعرض المعلومات
      setTimeout(() => {
        window.location.href = redirectUrl.toString();
      }, 1000);
    } else {
      // إذا لم تكن هناك معلمة shop، قم بالتوجيه إلى لوحة التحكم
      shopInfo.textContent = "لم يتم توفير معلمة متجر - التوجيه إلى لوحة التحكم";
      setTimeout(() => {
        window.location.href = "/dashboard";
      }, 1000);
    }
  </script>
</body>
</html>
