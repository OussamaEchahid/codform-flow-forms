
<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جاري التوجيه - CODFORM</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      direction: rtl;
    }
    .container {
      text-align: center;
      padding: 2rem;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #7c3aed;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 2s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>جاري التوجيه إلى لوحة التحكم</h1>
    <div class="loader"></div>
    <p>سيتم توجيهك تلقائيًا إلى لوحة التحكم خلال لحظات...</p>
  </div>

  <script>
    // التحقق مما إذا كانت هذه الصفحة تُحمل من Shopify
    const params = new URLSearchParams(window.location.search);
    const shop = params.get("shop");
    
    // توجيه المستخدم إلى الموقع المناسب
    window.onload = function() {
      if (shop) {
        // إذا كان المستخدم قادمًا من Shopify، قم بالتوجيه إلى المصادقة
        window.location.href = `/auth?shop=${shop}`;
      } else {
        // خلاف ذلك، قم بالتوجيه إلى لوحة التحكم
        window.location.href = "/dashboard";
      }
    };
  </script>
</body>
</html>
